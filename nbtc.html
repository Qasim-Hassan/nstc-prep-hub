<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBTC Prep - Olympiad Hub</title>
    <style>
        /* --- CHATBOT WIDGET CSS --- */
        :root{ --secondary-accent: #03dac6; }
        #chatbot-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        #help-tooltip { position: absolute; bottom: 75px; right: 0; background-color: var(--secondary-accent); color: #000; padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; white-space: nowrap; box-shadow: 0 4px 10px rgba(3, 218, 198, 0.3); animation: floatUpDown 2s infinite ease-in-out; pointer-events: none; transition: opacity 0.3s ease; }
        #help-tooltip::after { content: ''; position: absolute; bottom: -6px; right: 20px; border-width: 6px 6px 0; border-style: solid; border-color: var(--secondary-accent) transparent transparent transparent; }
        @keyframes floatUpDown { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        #chat-window { display: none; width: 380px; height: 550px; background-color: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5); flex-direction: column; overflow: hidden; margin-bottom: 15px; }
        #chat-header { background-color: #222; padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        #chat-header h3 { margin: 0; font-size: 1rem; color: var(--accent-color); }
        #close-chat { background: none; border: none; color: #888; cursor: pointer; font-size: 1.2rem; }
        #close-chat:hover { color: white; }
        #chat-messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; }
        .message p { margin: 0 0 8px 0; }
        .message p:last-child { margin: 0; }
        .message ul, .message ol { margin: 8px 0; padding-left: 20px; }
        .message li { margin-bottom: 4px; }
        
        .user-msg { background-color: var(--accent-color); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-msg { background-color: #2a2a2a; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        #chat-input-area { display: flex; padding: 15px; background-color: var(--card-bg); border-top: 1px solid var(--card-border); }
        #user-input { flex-grow: 1; padding: 12px; background-color: var(--bg-color); border: 1px solid var(--card-border); border-radius: 6px; color: white; outline: none; font-size: 0.95rem; }
        #user-input:focus { border-color: var(--accent-color); }
        #send-btn { background-color: var(--accent-color); color: black; border: none; border-radius: 6px; padding: 0 15px; margin-left: 10px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        #send-btn:hover { opacity: 0.8; }
        
        #chat-toggle-btn { background-color: var(--accent-color); color: black; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(187, 134, 252, 0.4); float: right; transition: transform 0.2s; display: flex; align-items: center; justify-content: center;}
        #chat-toggle-btn:hover { transform: scale(1.05); }
        
        .typing-indicator { display: inline-flex; gap: 4px; }
        .typing-indicator span { width: 6px; height: 6px; background-color: #888; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        /* --- MOBILE RESPONSIVENESS FIXES --- */
        @media (max-width: 480px) {
        header { padding: 3rem 1rem 1rem; }
        .container { padding: 0 1rem 2rem; }
        #chatbot-container { bottom: 15px; right: 15px; }
        #chat-window {
        width: 90vw; 
        height: 70vh; 
        max-width: none;
        margin-bottom: 10px;
        }
        #help-tooltip { right: 5px; }
        }
    </style>
</head>
<body style="background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif;">
    <div style="max-width: 800px; margin: 0 auto; padding: 2rem;">
        <a href="select_exam.html" style="color: #bb86fc; text-decoration: none;">&larr; Back to Home</a>
        <h1 style="color: #bb86fc; margin-top: 1rem;">National Biology Talent Contest (NBTC)</h1>
        
        <h2 style="border-bottom: 1px solid #333; padding-bottom: 0.5rem; margin-top: 2rem;">Prep Guide & Resources</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem;">
            <a href="https://nstcprep.pk/nbtc/guide" target="_blank" style="background-color: #3700b3; color: white; padding: 1rem; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold;">Official Prep Guide</a>
            <a href="https://drive.google.com/drive/folders/1745To0zPDw1Pb4KiBGzjIZxO0Z7UFzTk" target="_blank" style="border: 2px solid #3700b3; color: white; padding: 1rem; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold;">Recommended Resources</a>
        </div>

        <h2 style="border-bottom: 1px solid #333; padding-bottom: 0.5rem; margin-top: 3rem;">Past Papers Archive</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem;">
            <a href="nbtc_past_papers.html" style="background-color: #03dac6; color: #121212; padding: 1rem; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold;">Go to Past Papers</a>
        </div>
    </div>
    <div id="chatbot-container">
        <div id="help-tooltip">Need help? Ask! ✨</div>
        <div id="chat-window">
            <div id="chat-header">
                <h3>🧿 Olympiad Oracle</h3>
                <button id="close-chat">✖</button>
            </div>
            <div id="chat-messages">
                <div class="message bot-msg">Hello! I'm the Olympiad Oracle. Ask me anything about the NMTC, NPTC, NBTC, or NCTC!</div>
            </div>
            <div id="chat-input-area">
                <input type="text" id="user-input" placeholder="Type your question..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
        <button id="chat-toggle-btn">💬</button>
    </div>
    <script>
        // Wake-up ping
        fetch('https://MRMD007.pythonanywhere.com/', { mode: 'no-cors' })
            .catch(() => console.log("Oracle waking up..."));
    
        const chatWindow = document.getElementById('chat-window');
        const toggleBtn = document.getElementById('chat-toggle-btn');
        const closeBtn = document.getElementById('close-chat');
        const sendBtn = document.getElementById('send-btn');
        const userInput = document.getElementById('user-input');
        const chatMessages = document.getElementById('chat-messages');
        const helpTooltip = document.getElementById('help-tooltip');
    
        // GLOBAL persistent context
        let context = [];
    
        toggleBtn.addEventListener('click', () => {
            chatWindow.style.display = chatWindow.style.display === 'flex' ? 'none' : 'flex';
            helpTooltip.style.opacity = '0';
        });
    
        closeBtn.addEventListener('click', () => chatWindow.style.display = 'none');
    
        function scrollToBottom() {
            setTimeout(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 50);
        }
    
        function appendMessage(text, sender, isMarkdown = false) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-msg' : 'bot-msg');
    
            if (isMarkdown) {
                msgDiv.innerHTML = marked.parse(text);
            } else {
                msgDiv.textContent = text;
            }
    
            chatMessages.appendChild(msgDiv);
            scrollToBottom();
        }
    
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
    
            // Add user message
            context.push({ role: "user", content: message });
    
            // Keep a reasonable memory
            context = context.slice(-10);
    
            appendMessage(message, 'user');
            userInput.value = '';
    
            const thinkingId = 'thinking-' + Date.now();
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', 'bot-msg');
            msgDiv.id = thinkingId;
            msgDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            chatMessages.appendChild(msgDiv);
            scrollToBottom();
    
            try {
                const response = await fetch('https://MRMD007.pythonanywhere.com/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
    
                    // IMPORTANT: send full context
                    body: JSON.stringify({ message: context })
                });
    
                const data = await response.json();
    
                document.getElementById(thinkingId)?.remove();
    
                if (data.reply) {
                    appendMessage(data.reply, 'bot', true);
    
                    // Keep role consistent
                    context.push({ role: "assistant", content: data.reply });
    
                    context = context.slice(-10);
                } else {
                    let errorText = data.error || "Something went wrong.";
    
                    if (
                        errorText.includes("429") ||
                        errorText.includes("RESOURCE_EXHAUSTED") ||
                        errorText.includes("quota")
                    ) {
                        errorText = "Whoa, getting too many questions at once! 😅 The Oracle needs a quick 60-second breather. Please try again in a minute!";
                    } else {
                        errorText = "Oops! Connection error: " + errorText;
                    }
    
                    appendMessage(errorText, 'bot');
                }
    
            } catch (error) {
                document.getElementById(thinkingId)?.remove();
                appendMessage("Cannot connect to server. Is Python running?", 'bot');
                console.error(error);
            }
        }
    
        sendBtn.addEventListener('click', sendMessage);
    
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
