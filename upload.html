<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Upload Resource | Olympiad Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #0d0d0d; --card-bg: #1a1a1a; --text-main: #ffffff; --text-muted: #888888; --accent-color: #03dac6; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 2rem; display: flex; justify-content: center; }
        .upload-card { background-color: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 600px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0 20px 0; background-color: #262626; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        button { background-color: var(--accent-color); color: #000; width: 100%; border: none; padding: 15px; font-weight: bold; font-size: 1.1rem; border-radius: 6px; cursor: pointer; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="upload-card">
        <a href="resources.html" style="color: var(--text-muted); text-decoration: none; margin-bottom: 2rem; display: block;">&larr; Cancel and return to Board</a>
        <h2 style="color: var(--accent-color); margin-top: 0;">Upload a Resource</h2>
        <p style="color: var(--text-muted);">Share your notes or cheat sheets to help others prepare.</p>
        
        <form id="upload-form">
            <label>Resource Title</label>
            <input type="text" id="title" placeholder="e.g., Kinematics Short Notes" required>

            <label>Select Subject</label>
            <select id="subject">
                <option value="Physics">Physics (NPTC)</option>
                <option value="Math">Math (NMTC)</option>
                <option value="Chemistry">Chemistry (NCTC)</option>
                <option value="Biology">Biology (NBTC)</option>
            </select>

            <label>Google Drive / Notion Link</label>
            <input type="url" id="link" placeholder="https://..." required>

            <button type="submit" id="submit-btn">Submit to Community Board</button>
        </form>
    </div>

    <script>
        // --- PASTE YOUR KEYS HERE ---
        const SUPABASE_URL = 'https://oetdlhxeylswohijqypd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ldGRsaHhleWxzd29oaWpxeXBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTEwMDYsImV4cCI6MjA5MDI2NzAwNn0.O0wuALd8lm3YxbbthbDYPQF0vwXULimXdKhrEN7TSDU';
        // ----------------------------

        // Rename variable to 'supabaseClient' to avoid SyntaxError
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Uploading...";
            btn.disabled = true;
            
            const title = document.getElementById('title').value;
            const subject = document.getElementById('subject').value;
            const link = document.getElementById('link').value;

            // Use 'supabaseClient' instead of 'supabase'
            const { data, error } = await supabaseClient.from('resources').insert([{ title: title, subject: subject, drive_link: link }]);

            if (error) {
                alert("DATABASE ERROR: " + error.message);
                btn.innerText = "Submit to Community Board";
                btn.disabled = false;
            } else {
                // Redirect back to your main resources page!
                window.location.href = 'resources.html';
            }
        });
    </script>
</body>
</html>
