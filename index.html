<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YJZRGZWDM6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-YJZRGZWDM6');
    </script>
    
    <title>Olympiad Prep Hub | Break Into NSTC</title>
    <style>
        :root {
            --bg-color: #0d0d0d; /* Slightly darker background like the screenshot */
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-color: #bb86fc; /* The purple accent */
            --button-hover: #9e67e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Takes up the full height of the screen */
            text-align: center;
        }

        /* Top Logo Area */
        .nav-logo {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: white;
        }

        .hero-section {
            max-width: 800px;
            padding: 2rem;
        }

        /* The Main Headline */
        h1 {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        /* The Italicized Purple Text */
        .accent {
            color: var(--accent-color);
            font-style: italic;
            font-weight: 500;
        }

        /* The Sub-headline */
        p.sub-head {
            color: var(--text-muted);
            font-size: 1.4rem;
            line-height: 1.6;
            margin: 0 auto 3rem auto;
            max-width: 650px;
        }

        /* The Call to Action Button */
        .btn-primary {
            display: inline-block;
            background-color: var(--accent-color);
            color: #000000;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 1.2rem 3rem;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
        }

        /* The Quotes Section */
        .quote-container {
            margin-top: 4rem;
            font-size: 1rem;
            color: #555555;
            min-height: 40px;
            font-style: italic;
        }

        /* Responsive design for mobile phones */
        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; }
            p.sub-head { font-size: 1.1rem; }
            .nav-logo { position: static; margin-bottom: 2rem; }
        }
    </style>
</head>
<body>

    <div class="nav-logo">Olympiad Hub</div>

    <main class="hero-section">
        <h1>Everything You Need to <br><span class="accent">Break Into NSTC</span></h1>
        
        <p class="sub-head">Personalized roadmaps. Official past papers. Daily practice. Master the concepts that secure your spot in the Olympiad training camps.</p>
        
        <a href="select_exam.html" class="btn-primary">Start Learning &rarr;</a>

        <div class="quote-container">
            <p id="quote-text">"An investment in knowledge pays the best interest." - Benjamin Franklin</p>
        </div>
    </main>

    <script>
        const quotes = [
            "\"An investment in knowledge pays the best interest.\" - Benjamin Franklin",
            "\"The beautiful thing about learning is that no one can take it away from you.\" - B.B. King",
            "\"Education is the most powerful weapon which you can use to change the world.\" - Nelson Mandela",
            "\"The roots of education are bitter, but the fruit is sweet.\" - Aristotle"
        ];
        let qIndex = 0;
        setInterval(() => {
            qIndex = (qIndex + 1) % quotes.length;
            document.getElementById('quote-text').innerText = quotes[qIndex];
        }, 5000);
    </script>
</body>
</html>
