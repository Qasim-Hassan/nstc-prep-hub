<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Board | Olympiad Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #0d0d0d; --card-bg: #1a1a1a; --text-main: #ffffff; --text-muted: #888888; --accent-color: #03dac6; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid #333; padding-bottom: 1rem; }
        .btn-upload { background-color: var(--accent-color); color: #000; text-decoration: none; padding: 10px 20px; font-weight: bold; border-radius: 6px; transition: all 0.2s; }
        .btn-upload:hover { opacity: 0.8; }
        .resource-item { background-color: var(--card-bg); border-left: 4px solid var(--accent-color); padding: 1.5rem; margin-bottom: 1rem; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .resource-item a { color: var(--text-main); text-decoration: none; font-weight: bold; font-size: 1.2rem; }
        .resource-item a:hover { color: var(--accent-color); }
        .badge { background-color: #333; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="color: var(--text-muted); text-decoration: none;">&larr; Back to Home</a>
        
        <div class="header-flex" style="margin-top: 2rem;">
            <div>
                <h1 style="margin: 0; color: var(--accent-color);">Community Board</h1>
                <p style="margin: 5px 0 0 0; color: var(--text-muted);">High-yield notes and past papers from NSTC candidates.</p>
            </div>
            <a href="upload.html" class="btn-upload">+ Upload Resource</a>
        </div>

        <div id="resource-list">
            <p style="color: var(--text-muted);">Fetching latest resources...</p>
        </div>
    </div>

    <script>
        // --- PASTE YOUR KEYS HERE ---
        const SUPABASE_URL = 'https://oetdlhxeylswohijqypd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ldGRsaHhleWxzd29oaWpxeXBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTEwMDYsImV4cCI6MjA5MDI2NzAwNn0.O0wuALd8lm3YxbbthbDYPQF0vwXULimXdKhrEN7TSDU';
        // ----------------------------

        // Rename variable to 'supabaseClient' to avoid SyntaxError
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadResources() {
            const listDiv = document.getElementById('resource-list');
            
            // Use 'supabaseClient' instead of 'supabase'
            const { data, error } = await supabaseClient.from('resources').select('*').order('created_at', { ascending: false });

            if (error) {
                listDiv.innerHTML = `<p style="color: #cf6679;">Error connecting to database: ${error.message}</p>`;
                return;
            }
            if (data.length === 0) {
                listDiv.innerHTML = `<p style="color: var(--text-muted);">No resources uploaded yet. Be the first to contribute!</p>`;
                return;
            }

            listDiv.innerHTML = ''; 
            data.forEach(item => {
                listDiv.innerHTML += `
                    <div class="resource-item">
                        <div><a href="${item.drive_link}" target="_blank">${item.title}</a></div>
                        <div class="badge">${item.subject}</div>
                    </div>
                `;
            });
        }
        loadResources();
    </script>
</body>
</html>
