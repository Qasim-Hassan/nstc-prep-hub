<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>NPTC Past Papers - Olympiad Hub</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-color: #bb86fc;
            --button-bg: #3700b3;
            --button-hover: #6200ea;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .content-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .back-link {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 1.1rem;
            display: inline-block;
            margin-bottom: 2rem;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 2rem;
        }

        .pdf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn {
            background-color: var(--button-bg);
            color: white;
            text-align: center;
            padding: 1rem;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s ease;
            display: block;
        }

        .btn:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <a href="nptc.html" class="back-link">&larr; Back to NPTC Hub</a>

        <h1>NPTC Past Papers Archives</h1>
        <p>Access previous years' papers directly from the community drive.</p>

        <div class="pdf-grid">
            <a href="https://drive.google.com/file/d/1QWkwpcwPCDgFqOiVxwdvopHk_lKOwu65/view" target="_blank" class="btn">NPTC 2021 Paper</a>
            <a href="https://drive.google.com/file/d/18cWgy4slP1bEpTDgFN0G1cSCSSruDVU5/view" target="_blank" class="btn">NPTC 2020 Paper</a>
            <a href="https://drive.google.com/file/d/1qAf53D1PHoLL33-vesm-YQOTK0ccyioZ/view" target="_blank" class="btn">NPTC 2019 Paper</a>
        </div>

    </div>

</body>
</html>
